# Chốt nghỉ không phép sau hết ngày theo Asia/Ho_Chi_Minh.
# 00:05 ICT = 17:05 UTC ngày hôm trước → cron: 5 17 * * *
# Job luôn tính targetDate = ngày hôm trước theo ICT (không dùng ngày UTC).
name: Auto absent attendance

on:
  schedule:
    - cron: '5 17 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Verify secrets present
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "FAIL: Missing GitHub secret SUPABASE_URL"
            exit 1
          fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "FAIL: Missing GitHub secret SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          fi
          echo "Secrets present (values not printed)."
      - name: Run auto-absent job (ICT previous day)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AUTO_ABSENT_REQUIRE_SERVICE_ROLE: '1'
          CI: 'true'
        run: npx vite-node scripts/run-auto-absent-attendance.mjs
